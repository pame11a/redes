pc0[0]=A
pc1[0]=B

sw[0]=A
sw[1]=B
sw[2]=C
sw[exec]=brctl addbr br0 
sw[exec]=brctl addif br0 eth0 eth1 eth2
sw[exec]=ifconfig br0 up
sw[exec]=brctl stp br0 on 

router[0]=C
router[exec]=ifconfig eth0 add 2001:1234:A:B::1/64
router[exec]=/etc/init.d/radvd start 

pc0[sysctl]=net.ipv6.conf.eth0.accept_ra=2
pc1[sysctl]=net.ipv6.conf.eth0.accept_ra=2
